apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kafkacontroller
  namespace: confluent
spec:
  dataVolumeCapacity: 10Gi
  image:
    application: confluentinc/cp-server:8.0.0.arm64
    init: confluentinc/confluent-init-container:3.0.0.arm64
  configOverrides:
    server:
      # added as the replication listener configuration was missing and is needed for proper authentication
      - listener.name.replication.ssl.key.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}
      - listener.name.replication.ssl.keystore.location=/mnt/sslcerts/keystore.p12
      - listener.name.replication.ssl.keystore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}
      - listener.name.replication.ssl.truststore.location=/mnt/sslcerts/truststore.p12
      - listener.name.replication.ssl.truststore.password=${file:/mnt/sslcerts/jksPassword.txt:jksPassword}
      - listener.security.protocol.map=CONTROLLER:SSL,REPLICATION:SSL
  listeners:
    controller:
      authentication:
        type: mtls
        principalMappingRules:
          - "RULE:.*CN=([a-zA-Z0-9.-]*).*$/$1/"
          - "DEFAULT"
      tls:
        enabled: true
  authorization:
    type: rbac
    superUsers:
      - User:kafkabroker
      - User:kafkacontroller
  dependencies:
    mdsKafkaCluster:
      bootstrapEndpoint: kafkabroker.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
        sslClientAuthentication: true
      tls:
        enabled: true
    metricsClient:
      url: https://controlcenter.confluent.svc.cluster.local:9090
      tls:
        enabled: true
        secretRef: tls-kafkacontroller
      authentication:
        type: mtls
  tls:
    secretRef: tls-kafkacontroller
  replicas: 3
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafkabroker
  namespace: confluent
spec:
  authorization:
    type: rbac
    superUsers:
      - User:kafkabroker
      - User:kafkacontroller
      - User:kafkarestclass
  replicas: 3
  image:
    application: confluentinc/cp-server:8.0.0.arm64
    init: confluentinc/confluent-init-container:3.0.0.arm64
  dataVolumeCapacity: 10Gi
  tls:
    secretRef: tls-kafkabroker
  listeners:
    internal:
      authentication:
        type: mtls
        principalMappingRules:
          - "RULE:.*CN=([a-zA-Z0-9.-]*).*$/$1/"
          - "DEFAULT"
      tls:
        enabled: true
    external:
      authentication:
        type: mtls
        principalMappingRules:
          - "RULE:.*CN=([a-zA-Z0-9.-]*).*$/$1/"
          - "DEFAULT"
      tls:
        enabled: true
      externalAccess:
        type: loadBalancer
        loadBalancer:
          domain: confluentdemo.io
          brokerPrefix: "kafkabroker-"
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-keypair
      provider:
        ldap:
          address: ldaps://ldap.identity.svc.cluster.local:636
          authentication:
            type: simple
            simple:
              secretRef: mds-binduser
          configurations:
            groupMemberAttribute: memberUid
            groupMemberAttributePattern: cn=(.*),ou=users,dc=confluentdemo,dc=io
            groupNameAttribute: cn
            groupObjectClass: posixGroup
            groupSearchBase: ou=groups,dc=confluentdemo,dc=io
            groupSearchScope: 2
            userNameAttribute: cn
            userObjectClass: posixAccount
            userSearchBase: ou=users,dc=confluentdemo,dc=io
            userSearchScope: 2
          tls:
            enabled: true
            secretRef: tls-kafkabroker
  dependencies:
    kafkaRest:
      authentication:
        type: bearer
        bearer:
          secretRef: bearer-kafkabroker
      tls:
        enabled: true
        secretRef: tls-kafkabroker
    kRaftController:
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: mtls
      clusterRef:
        name: kafkacontroller
    metricsClient:
      url: https://controlcenter.confluent.svc.cluster.local:9090
      tls:
        enabled: true
        secretRef: tls-kafkabroker
      authentication:
        type: mtls
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: default
  namespace: confluent
spec:
  kafkaClusterRef:
    name: kafkabroker
    namespace: confluent
  kafkaRest:
    endpoint: https://kafkabroker.confluent.svc.cluster.local:8090
    authentication:
      type: bearer
      bearer:
        secretRef: bearer-kafkarestclass
    tls:
      secretRef: tls-kafkarestclass
