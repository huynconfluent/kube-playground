---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: default
  namespace: confluent
spec:
  kafkaClusterRef:
    name: kafkabroker
    namespace: confluent
  kafkaRest:
    endpoint: https://kafkabroker.confluent.svc.cluster.local:8090
    authentication:
      type: bearer
      bearer:
        secretRef: bearer-kafkarestclass
    tls:
      secretRef: tls-kafkarestclass
