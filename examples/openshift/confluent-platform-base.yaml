apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kafkacontroller
  namespace: confluent
spec:
  podTemplate:
    # for openshift to use default scc
    podSecurityContext: {}
    resources:
      limits:
        cpu: 200m
        memory: 512Mi
  dataVolumeCapacity: 8Gi
  image:
    application: default-route-openshift-image-registry.apps-crc.testing/confluent/cp-server:8.0.0-1-ubi9.arm64
    init: default-route-openshift-image-registry.apps-crc.testing/confluent/confluent-init-container:3.1.1.arm64
  listeners:
    controller:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: otxt-kafkacontroller
        oauthSettings:
          jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
          tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
      tls:
        enabled: true
  authorization:
    type: rbac
    superUsers:
      - User:kafkabroker
      - User:kafkacontroller
      - User:kafkarestclass
  configOverrides:
    jvm:
      - "-Djavax.net.ssl.trustStore=/mnt/sslcerts/truststore.p12"
      - "-Djavax.net.ssl.trustStorePassword=mystorepassword"
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=*"
  dependencies:
    mdsKafkaCluster:
      bootstrapEndpoint: kafkabroker.confluent.svc.cluster.local:9071
      authentication:
        type: oauth
        jaasConfig:
          secretRef: otxt-kafkacontroller
        oauthSettings:
          tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
      tls:
        enabled: true
    metricsClient:
      url: https://controlcenter.confluent.svc.cluster.local:9090
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: tls-kafkacontroller
  tls:
    secretRef: tls-kafkacontroller
  replicas: 1
---
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafkabroker
  namespace: confluent
spec:
  podTemplate:
    # for openshift to use default scc
    podSecurityContext: {}
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
  configOverrides:
    jvm:
      - "-Djavax.net.ssl.trustStore=/mnt/sslcerts/truststore.p12"
      - "-Djavax.net.ssl.trustStorePassword=mystorepassword"
      - "-Dorg.apache.kafka.sasl.oauthbearer.allowed.urls=*"
    server:
      - "confluent.license.topic.replication.factor=1"
      - "confluent.metrics.reporter.topic.replicas=1"
      - "confluent.tier.metadata.replication.factor=1"
      - "confluent.metadata.topic.replication.factor=1"
      - "confluent.balancer.topic.replication.factor=1"
      - "confluent.security.event.logger.exporter.kafka.topic.replicas=1"
      - "event.logger.exporter.kafka.topic.replicas=1"
      - "offsets.topic.replication.factor=1"
  authorization:
    type: rbac
    superUsers:
      - User:kafkabroker
      - User:kafkacontroller
      - User:kafkarestclass
  replicas: 1
  image:
    application: default-route-openshift-image-registry.apps-crc.testing/confluent/cp-server:8.0.0-1-ubi9.arm64
    init: default-route-openshift-image-registry.apps-crc.testing/confluent/confluent-init-container:3.1.1.arm64
  dataVolumeCapacity: 10Gi
  tls:
    secretRef: tls-kafkabroker
  listeners:
    internal:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: otxt-kafkabroker
        oauthSettings:
          jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
          tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
      tls:
        enabled: true
    external:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: otxt-kafkabroker
        oauthSettings:
          jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
      tls:
        enabled: true
      externalAccess:
        type: route
        route:
          domain: confluentdemo.io
          brokerPrefix: "kafkabroker-"
  services:
    mds:
      tls:
        enabled: true
      tokenKeyPair:
        secretRef: mds-keypair
      provider:
        oauth:
          configurations:
            expectedIssuer: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo"
            jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
            tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
        sso:
          enabled: true
          clientCredentials:
            secretRef: oidc-controlcenter
          configurations:
            issuer: "https://keycloak.confluentdemo.io/realms/confluentdemo"
            jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
            authorizeBaseEndpointUri: "https://keycloak.confluentdemo.io/realms/confluentdemo/protocol/openid-connect/auth"
            tokenBaseEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
            refreshToken: false
  dependencies:
    kafkaRest:
      authentication:
        type: oauth
        jaasConfig:
          secretRef: otxt-kafkabroker
        oauthSettings:
          tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
          expectedIssuer: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo"
          jwksEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/certs"
      tls:
        enabled: true
        secretRef: tls-kafkabroker
    kRaftController:
      clusterRef:
        name: kafkacontroller
      controllerListener:
        tls:
          enabled: true
        authentication:
          type: oauth
          jaasConfig:
            secretRef: otxt-kafkabroker
          oauthSettings:
            tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
    metricsClient:
      url: https://controlcenter.confluent.svc.cluster.local:9090
      authentication:
        type: mtls
      tls:
        enabled: true
        secretRef: tls-kafkabroker
---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaRestClass
metadata:
  name: default
  namespace: confluent
spec:
  kafkaClusterRef:
    name: kafkabroker
    namespace: confluent
  kafkaRest:
    endpoint: https://kafkabroker.confluent.svc.cluster.local:8090
    authentication:
      type: oauth
      oauth:
        configuration:
          tokenEndpointUri: "https://keycloak.identity.svc.cluster.local/realms/confluentdemo/protocol/openid-connect/token"
        secretRef: otxt-kafkarestclass
    tls:
      secretRef: tls-kafkarestclass
