{{- if .Values.openshift }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.name }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  host: keycloak.confluentdemo.io
  
  to:
    kind: Service
    name: {{ .Values.name }}
    weight: 100
    
  port:
    targetPort: {{ .Values.ports.https }}
    
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
