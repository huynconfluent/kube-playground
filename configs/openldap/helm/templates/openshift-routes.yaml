{{- if .Values.openshift }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.name }}-secure
  namespace: {{ .Release.Namespace }}
  labels:
    app: keycloak
spec:
  host: openldap.confluentdemo.io
  
  to:
    kind: Service
    name: {{ .Values.name }}
    weight: 100
    
  port:
    targetPort: 636
    
  tls:
    termination: passthrough
{{- end }}
